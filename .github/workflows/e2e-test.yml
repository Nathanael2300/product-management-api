name: E2e Tests

on:
  push:
    branches:
      - main
      - feature/**

  pull_request:
    branches:
      - main
      - feature/**

jobs:
  E2e-Tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Start server
        run: |
          npm start > server.log 2>&1 &
          sleep 5

      - name: Show server logs
        run: cat server.log

      - name: Check server
        run: curl http://localhost:3003/products || true

      - name: Wait for server
        run: npx wait-on http://localhost:3003/products
